# CI workflow for oxid64
#
# PR / push to main:
#   - lint-and-test: fmt, clippy, cargo test (fast gate, ~2 min)
#   - miri: Miri with strict flags on lib + integration tests (~10-15 min)
#   - careful: cargo-careful on lib + tests (~3-5 min)
#   - sanitizers: ASan + MSan (~5-10 min)
#
# Nightly schedule (or manual dispatch):
#   - All of the above plus Kani proofs and fuzz-build smoke.
#
# Notes:
#   - The Turbo-Base64 C library is only needed for benchmarks and C comparisons,
#     NOT for the Rust test suite. We skip `just build-c` in CI to avoid clang/make
#     dependencies unless explicitly needed.
#   - Kani and cargo-fuzz are heavyweight; they run only on nightly schedule.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Reduce proptest cases in CI for speed; full runs happen locally.
  PROPTEST_CASES: "256"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Fast gate: format, lint, test (~2 min)
  # ─────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test

  # ─────────────────────────────────────────────────────────────────────
  # Miri: strict provenance + symbolic alignment (~10-15 min)
  # ─────────────────────────────────────────────────────────────────────
  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - uses: Swatinem/rust-cache@v2

      - name: Run Miri on lib tests
        env:
          MIRIFLAGS: >-
            -Zmiri-symbolic-alignment-check
            -Zmiri-strict-provenance
            -Zmiri-disable-isolation
        run: cargo +nightly miri test --lib

      - name: Run Miri on integration tests
        env:
          MIRIFLAGS: >-
            -Zmiri-symbolic-alignment-check
            -Zmiri-strict-provenance
            -Zmiri-disable-isolation
        run: |
          cargo +nightly miri test --test scalar_contracts
          cargo +nightly miri test --test common_contracts
          cargo +nightly miri test --test msan_scalar_contracts
          cargo +nightly miri test --test proptest
          cargo +nightly miri test --test simd_fuzz_strict
          cargo +nightly miri test --test sse_decode_tests
          cargo +nightly miri test --test sse_encode_tests
          cargo +nightly miri test --test avx2_decode_tests
          cargo +nightly miri test --test avx2_encode_tests
          cargo +nightly miri test --test avx512_vbmi_decode_tests
          cargo +nightly miri test --test avx512_vbmi_encode_tests
          cargo +nightly miri test --test ssse3_models
          cargo +nightly miri test --test avx2_models
          cargo +nightly miri test --test avx512_vbmi_models
          cargo +nightly miri test --test neon_models
          cargo +nightly miri test --test wasm_simd128_models

  # ─────────────────────────────────────────────────────────────────────
  # cargo-careful: extra UB checks beyond debug mode (~3-5 min)
  # ─────────────────────────────────────────────────────────────────────
  careful:
    name: cargo-careful
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-careful
        run: cargo install cargo-careful

      - name: Run cargo-careful
        run: |
          cargo +nightly careful test --lib --tests
          cargo +nightly careful test --doc

  # ─────────────────────────────────────────────────────────────────────
  # Sanitizers: AddressSanitizer + MemorySanitizer (~5-10 min)
  # Requires nightly + -Zbuild-std for sanitizer runtime.
  # ─────────────────────────────────────────────────────────────────────
  sanitizers:
    name: ASan + MSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: AddressSanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0
          RUSTFLAGS: -Zsanitizer=address
          RUSTDOCFLAGS: -Zsanitizer=address
        run: |
          cargo +nightly test -Zbuild-std --target x86_64-unknown-linux-gnu --lib --tests
          cargo +nightly test -Zbuild-std --target x86_64-unknown-linux-gnu --doc

      - name: MemorySanitizer
        env:
          MSAN_OPTIONS: "halt_on_error=1,exit_code=86,poison_in_dtor=1"
          RUSTFLAGS: -Zsanitizer=memory
          RUSTDOCFLAGS: -Zsanitizer=memory
        run: |
          cargo +nightly test -Zbuild-std --target x86_64-unknown-linux-gnu --lib --tests
          cargo +nightly test -Zbuild-std --target x86_64-unknown-linux-gnu --doc

  # ─────────────────────────────────────────────────────────────────────
  # Kani proofs (nightly schedule / manual only — heavyweight)
  # ─────────────────────────────────────────────────────────────────────
  kani:
    name: Kani Proofs
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install Kani
        uses: model-checking/kani-install@v0.1

      - uses: Swatinem/rust-cache@v2

      - name: Run all Kani harnesses
        run: |
          # Core harnesses
          cargo kani --default-unwind 8 --harness remaining_matches_pointer_delta_within_allocation
          cargo kani --default-unwind 8 --harness can_read_and_can_write_agree_with_remaining
          cargo kani --default-unwind 8 --harness safe_in_end_for_4_within_allocation
          cargo kani --default-unwind 8 --harness safe_in_end_for_16_within_allocation
          cargo kani --default-unwind 8 --harness guard_helpers_imply_required_io_room
          cargo kani --default-unwind 8 --harness prepare_decode_output_matches_decoded_len_contract
          cargo kani --default-unwind 8 --harness decoded_and_encoded_lengths_stay_bounded_in_small_domain
          cargo kani --default-unwind 8 --harness decode_offsets_monotonic_and_dispatch_contracts_hold

          # SSSE3
          cargo kani --default-unwind 8 --harness ssse3_ds64_store_offsets_fit_guarded_output
          cargo kani --default-unwind 8 --harness ssse3_ds64_double_store_offsets_fit_guarded_output
          cargo kani --default-unwind 8 --harness ssse3_tail16_store_fits_guarded_output
          cargo kani --default-unwind 8 --harness ssse3_non_strict_schedule_model_matches_documented_lanes
          cargo kani --default-unwind 8 --harness ssse3_written_prefix_model_is_bounded_by_decoded_output

          # AVX2
          cargo kani --default-unwind 8 --harness avx2_ds128_store_offsets_fit_guarded_output
          cargo kani --default-unwind 8 --harness avx2_ds128_double_store_offsets_fit_guarded_output
          cargo kani --default-unwind 8 --harness avx2_ds128_triple_store_offsets_fit_guarded_output
          cargo kani --default-unwind 8 --harness avx2_tail16_store_fits_guarded_output
          cargo kani --default-unwind 8 --harness avx2_non_strict_schedule_model_matches_documented_lanes
          cargo kani --default-unwind 8 --harness avx2_strict_written_prefix_model_is_bounded_by_decoded_output
          cargo kani --default-unwind 8 --harness avx2_partial_written_prefix_model_is_bounded_by_decoded_output
          cargo kani --default-unwind 8 --harness avx2_unchecked_preflight_matches_documented_contract

          # AVX-512
          cargo kani --default-unwind 8 --harness avx512_ds256_store_offsets_fit_guarded_output
          cargo kani --default-unwind 8 --harness avx512_ds256_double_store_offsets_fit_guarded_output
          cargo kani --default-unwind 8 --harness avx512_non_strict_schedule_model_matches_documented_lanes
          cargo kani --default-unwind 8 --harness avx512_written_prefix_model_is_bounded_by_decoded_output
          cargo kani --default-unwind 8 --harness avx512_encode_schedule_is_contiguous_without_gaps
          cargo kani --default-unwind 8 --harness avx512_encode_required_input_matches_farthest_load

          # NEON
          cargo kani --default-unwind 8 --harness neon_non_strict_schedule_model_matches_documented_lanes
          cargo kani --default-unwind 8 --harness neon_written_prefix_model_is_bounded_by_decoded_output
          cargo kani --default-unwind 8 --harness neon_encode_prefix_consumes_only_full_blocks
          cargo kani --default-unwind 8 --harness neon_encode_required_input_matches_block_boundaries

          # WASM
          cargo kani --default-unwind 8 --harness wasm_ds64_store_offsets_fit_guarded_output
          cargo kani --default-unwind 8 --harness wasm_ds64_double_store_offsets_fit_guarded_output
          cargo kani --default-unwind 8 --harness wasm_tail16_store_fits_guarded_output
          cargo kani --default-unwind 8 --harness wasm_non_strict_schedule_model_matches_documented_lanes
          cargo kani --default-unwind 8 --harness wasm_written_prefix_model_is_bounded_by_decoded_output
          cargo kani --default-unwind 8 --harness wasm_pshufb_model_matches_low_nibble_spec
          cargo kani --default-unwind 8 --harness wasm_encode_prefix_consumes_only_full_blocks
          cargo kani --default-unwind 8 --harness wasm_encode_required_input_matches_block_boundaries

  # ─────────────────────────────────────────────────────────────────────
  # Fuzz build + smoke (nightly schedule / manual only)
  # ─────────────────────────────────────────────────────────────────────
  fuzz:
    name: Fuzz Build & Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Build all fuzz targets
        run: |
          targets=(
            decode_diff encode_diff roundtrip invalid_semantics tail_alignment
            ssse3_strict_diff ssse3_non_strict_schedule
            avx2_strict_diff avx2_non_strict_schedule avx2_unchecked_contract avx2_partial_write_bounds
            avx512_strict_diff avx512_non_strict_schedule avx512_encode_diff avx512_partial_write_bounds
            neon_strict_diff neon_non_strict_schedule neon_encode_diff neon_partial_write_bounds
            wasm_pshufb_compat wasm_non_strict_schedule wasm_encode_prefix_model wasm_partial_write_model
          )
          for t in "${targets[@]}"; do
            echo "::group::Building fuzz target: $t"
            cargo +nightly fuzz build "$t"
            echo "::endgroup::"
          done

      - name: Smoke run (32 iterations each, x86 targets only)
        run: |
          targets=(
            decode_diff encode_diff roundtrip invalid_semantics tail_alignment
            ssse3_strict_diff ssse3_non_strict_schedule
            avx2_strict_diff avx2_non_strict_schedule avx2_unchecked_contract avx2_partial_write_bounds
            avx512_strict_diff avx512_non_strict_schedule avx512_encode_diff avx512_partial_write_bounds
          )
          for t in "${targets[@]}"; do
            echo "::group::Fuzz smoke: $t"
            mkdir -p "fuzz/corpus/$t"
            cargo +nightly fuzz run "$t" "fuzz/corpus/$t" -- -runs=32
            echo "::endgroup::"
          done
